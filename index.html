<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Telecom - Secure Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
    
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="glass w-full max-w-md p-8 rounded-3xl shadow-xl border border-gray-200">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Lucky Telecom Dues Clear</h2>
        
        <form id="checkoutForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Customer ID</label>
                <input type="text" id="customerId" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Name</label>
                <input type="text" id="customerName" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Phone (+91)</label>
                <input type="tel" id="customerPhone" maxlength="10" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Amount to Pay (₹)</label>
                <input type="number" id="amount" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <button type="submit" id="payBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition active:scale-95 shadow-lg shadow-blue-200">
                Pay Now (Checkout)
            </button>
        </form>
    </div>

    <script>
        // Initialize Cashfree in Production Mode
        const cashfree = Cashfree({
            mode: "production" 
        });

        const form = document.getElementById('checkoutForm');
        const btn = document.getElementById('payBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Connecting to Bank...";

            const payload = {
                customerId: document.getElementById('customerId').value,
                customerName: document.getElementById('customerName').value,
                customerPhone: document.getElementById('customerPhone').value,
                amount: document.getElementById('amount').value
            };

            try {
                // ⚠️ YAHAN APNA NAYA WORKER URL DAALEIN ⚠️
                // Yaad rakhein end mein /create-order hona chahiye
                const response = await fetch("https://YOUR-WORKER-URL.workers.dev/create-order", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (response.ok && data.payment_session_id) {
                    btn.innerText = "Opening Checkout...";
                    
                    // Cashfree Checkout Page Open Karna
                    let checkoutOptions = {
                        paymentSessionId: data.payment_session_id,
                        redirectTarget: "_self" // Isi page mein khulega
                    };
                    cashfree.checkout(checkoutOptions);

                } else {
                    alert("Error: " + (data.error || "Failed to create order."));
                    console.error("Order Error:", data);
                    btn.disabled = false;
                    btn.innerText = "Pay Now (Checkout)";
                }
            } catch (err) {
                alert("Network Error: Backend se connect nahi ho paya.");
                console.error(err);
                btn.disabled = false;
                btn.innerText = "Pay Now (Checkout)";
            }
        });
    </script>
</body>
</html>
