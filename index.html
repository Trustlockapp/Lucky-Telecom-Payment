<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Telecom - Quick Pay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .btn-transition { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="glass w-full max-w-md p-8 rounded-3xl shadow-xl border border-gray-200">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Payment Link Generator</h2>
        
        <form id="duesForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Customer ID</label>
                <input type="text" id="customerId" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Name</label>
                <input type="text" id="customerName" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Phone (+91)</label>
                <input type="tel" id="customerPhone" maxlength="10" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Amount (₹)</label>
                <input type="number" id="amount" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 btn-transition active:scale-95 shadow-lg shadow-blue-200">
                Generate Link
            </button>
        </form>

        <div id="result" class="mt-6 hidden p-4 bg-green-50 border border-green-200 rounded-xl text-center">
            <p class="text-green-700 font-semibold mb-2">Link Generated Successfully!</p>
            <a id="paymentLink" href="#" target="_blank" class="block text-blue-600 font-mono text-sm break-all underline"></a>
            <button onclick="copyLink()" class="mt-3 text-xs text-gray-500 uppercase tracking-widest font-bold">Copy Link</button>
        </div>
    </div>

    <script>
        const form = document.getElementById('duesForm');
        const btn = document.getElementById('submitBtn');
        const resultDiv = document.getElementById('result');
        const linkTag = document.getElementById('paymentLink');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Processing...";
            resultDiv.classList.add('hidden'); // Purana result hide karein

            const payload = {
                customerId: document.getElementById('customerId').value,
                customerName: document.getElementById('customerName').value,
                customerPhone: document.getElementById('customerPhone').value,
                amount: document.getElementById('amount').value
            };

            try {
                // YOUR REAL WORKER URL
                const response = await fetch("https://lucky-telecom-backend.devicecontrolhub.workers.dev/generate-link", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (response.ok && data.link_url) {
                    linkTag.href = data.link_url;
                    linkTag.innerText = data.link_url;
                    resultDiv.classList.remove('hidden');
                } else {
                    // Exact error screen par dikhayega
                    alert("Error: " + (data.error || data.message || "Failed to generate link."));
                    console.error("Cashfree Error:", data);
                }
            } catch (err) {
                alert("Network Error: Backend se connect nahi ho paya.");
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = "Generate Link";
            }
        });

        function copyLink() {
            navigator.clipboard.writeText(linkTag.href);
            alert("Link Copied!");
        }
    </script>
</body>
</html>
